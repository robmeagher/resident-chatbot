<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Demo – Maymont Homes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; align-items: center; }

    /* Header */
    .header { text-align: center; }
    .header img { height: 52px; width: auto; margin: 0 auto 14px; display: block; }
    .header h1 { font-size: 20px; font-weight: 500; color: #111827; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #9ca3af; }

    /* Phone card */
    .phone-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Status */
    .status-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #d1d5db;
      transition: background 0.3s;
    }
    .status-dot.listening { background: #22c55e; animation: glow 1s infinite; }
    .status-dot.thinking { background: #f59e0b; }
    .status-dot.speaking { background: #3b82f6; animation: glow 1s infinite; }
    @keyframes glow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }
    .status-text { font-size: 13px; color: #6b7280; font-weight: 500; letter-spacing: 0.03em; }

    /* Mic button */
    .mic-wrap { position: relative; }
    .mic-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid #22c55e;
      opacity: 0;
      transition: opacity 0.3s;
      animation: none;
    }
    .mic-ring.active {
      opacity: 1;
      animation: ring 1.5s infinite;
    }
    @keyframes ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.3); opacity: 0; }
    }
    .mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: #111827;
      color: white;
      font-size: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      position: relative;
      z-index: 1;
    }
    .mic-btn:hover { background: #1f2937; transform: scale(1.05); }
    .mic-btn.listening { background: #22c55e; }
    .mic-btn.disabled { background: #9ca3af; cursor: not-allowed; transform: none; }

    .mic-hint { font-size: 12px; color: #9ca3af; text-align: center; }

    /* Transcript */
    .transcript-card {
      background: #f9fafb;
      border: 1px solid #f3f4f6;
      border-radius: 12px;
      padding: 14px 16px;
      width: 100%;
      min-height: 80px;
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .transcript-empty { font-size: 13px; color: #d1d5db; text-align: center; margin: auto; }
    .transcript-line { font-size: 13px; line-height: 1.5; }
    .transcript-line.resident { color: #111827; }
    .transcript-line.resident::before { content: 'You: '; color: #9ca3af; font-size: 11px; }
    .transcript-line.bot { color: #3b82f6; }
    .transcript-line.bot::before { content: 'Maymont: '; color: #9ca3af; font-size: 11px; }

    /* Result card */
    .result-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
    }
    .result-bar { height: 3px; background: #22c55e; }
    .result-inner { padding: 14px 16px; }
    .result-label { font-size: 10px; letter-spacing: 0.12em; color: #9ca3af; text-transform: uppercase; margin-bottom: 10px; }
    .result-fields { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .result-field { background: #f9fafb; border-radius: 8px; padding: 7px 11px; }
    .field-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .field-value { font-size: 13px; font-weight: 500; color: #111827; }
    .result-summary { font-size: 12px; color: #6b7280; border-top: 1px solid #f3f4f6; padding-top: 10px; margin-top: 4px; line-height: 1.6; }
    .summary-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .result-success { background: #f0fdf4; border-radius: 8px; padding: 9px 12px; font-size: 13px; color: #15803d; font-weight: 500; margin-top: 10px; }

    .reset-btn {
      background: none; border: none; color: #9ca3af; font-size: 12px;
      cursor: pointer; font-family: inherit; text-decoration: underline;
      margin-top: 4px;
    }
    .reset-btn:hover { color: #6b7280; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <img src="https://maymonthomes.com/wp-content/uploads/2023/06/logo_2x.png" alt="Maymont Homes" />
      <h1>Maintenance Voice Line</h1>
      <p>Tap the mic and describe your issue</p>
    </div>

    <div class="phone-card">
      <div class="status-wrap">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text" id="statusText">Ready</div>
      </div>

      <div class="mic-wrap">
        <div class="mic-ring" id="micRing"></div>
        <button class="mic-btn" id="micBtn" onclick="toggleListening()">🎤</button>
      </div>

      <div class="mic-hint" id="micHint">Tap to start speaking</div>

      <div class="transcript-card" id="transcript">
        <div class="transcript-empty" id="transcriptEmpty">Your conversation will appear here</div>
      </div>
    </div>

    <div class="result-card" id="resultCard" style="display:none">
      <div class="result-bar"></div>
      <div class="result-inner">
        <p class="result-label">Issue Identified</p>
        <div class="result-fields" id="resultFields"></div>
        <div id="resultSummary"></div>
        <div class="result-success">✓ Ready to submit in Quickbase</div>
      </div>
    </div>

    <button class="reset-btn" id="resetBtn" style="display:none" onclick="resetCall()">Start new call</button>

  </div>

  <script>
    let mediaRecorder = null;
    let audioChunks = [];
    let isListening = false;
    let isBusy = false;
    let conversationHistory = [];
    let detectedLanguage = 'en';
    let matched = false;
    let currentAudio = null;
    let hasGreeted = false;

    const micBtn = document.getElementById('micBtn');
    const micRing = document.getElementById('micRing');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const micHint = document.getElementById('micHint');
    const transcript = document.getElementById('transcript');
    const transcriptEmpty = document.getElementById('transcriptEmpty');

    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function addTranscriptLine(role, text) {
      if (transcriptEmpty) transcriptEmpty.remove();
      const line = document.createElement('div');
      line.className = `transcript-line ${role}`;
      line.textContent = text;
      transcript.appendChild(line);
      transcript.scrollTop = transcript.scrollHeight;
    }

    async function greet() {
      if (hasGreeted) return;
      hasGreeted = true;
      setStatus('thinking', 'Connecting...');
      try {
        const greeting = await getChatResponse([{ role: 'user', content: 'Hello' }]);
        if (greeting) {
          conversationHistory.push({ role: 'user', content: 'Hello' });
          conversationHistory.push({ role: 'assistant', content: greeting });
          addTranscriptLine('bot', cleanForDisplay(greeting));
          await speak(greeting);
        }
      } catch (e) {
        console.error('Greeting error:', e);
      }
      setStatus('', 'Ready');
      micHint.textContent = 'Tap to speak';
    }

    async function toggleListening() {
      if (isBusy || matched) return;

      if (!hasGreeted) {
        await greet();
        return;
      }

      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    }

    async function startListening() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(t => t.stop());
          await processAudio();
        };

        mediaRecorder.start();
        isListening = true;
        micBtn.classList.add('listening');
        micRing.classList.add('active');
        setStatus('listening', 'Listening...');
        micHint.textContent = 'Tap again when done speaking';
      } catch (e) {
        alert('Microphone access denied. Please allow microphone access and try again.');
      }
    }

    function stopListening() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      isListening = false;
      micBtn.classList.remove('listening');
      micRing.classList.remove('active');
      setStatus('thinking', 'Processing...');
      micHint.textContent = 'Processing...';
      isBusy = true;
      micBtn.classList.add('disabled');
    }

    async function processAudio() {
      try {
        // Step 1: Transcribe with Deepgram
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const transcribeRes = await fetch('/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'audio/webm' },
          body: audioBlob,
        });
        const transcribeData = await transcribeRes.json();
        const userText = transcribeData.transcript?.trim();
        detectedLanguage = transcribeData.detectedLanguage || 'en';

        if (!userText) {
          setStatus('', 'Ready');
          micHint.textContent = 'Tap to speak';
          isBusy = false;
          micBtn.classList.remove('disabled');
          return;
        }

        addTranscriptLine('resident', userText);
        conversationHistory.push({ role: 'user', content: userText });

        // Step 2: Get Claude response
        setStatus('thinking', 'Thinking...');
        const botText = await getChatResponse(conversationHistory);
        if (!botText) throw new Error('No response');

        const cleanText = cleanForDisplay(botText);
        const matchData = extractMatch(botText);

        conversationHistory.push({ role: 'assistant', content: botText });
        addTranscriptLine('bot', cleanText);

        if (matchData) {
          showResult(matchData);
        }

        // Step 3: Speak the response
        setStatus('speaking', 'Speaking...');
        await speak(cleanText);

        if (!matched) {
          setStatus('', 'Ready');
          micHint.textContent = 'Tap to speak';
        }

      } catch (e) {
        console.error('Processing error:', e);
        setStatus('', 'Ready');
        micHint.textContent = 'Something went wrong — tap to try again';
      }

      isBusy = false;
      if (!matched) micBtn.classList.remove('disabled');
    }

    async function getChatResponse(messages) {
      const res = await fetch('/api/voicechat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, detectedLanguage }),
      });
      const data = await res.json();
      return data.content?.[0]?.text || null;
    }

    async function speak(text) {
      try {
        const cleanedText = text
          .replace(/<match>[\s\S]*?<\/match>/g, '')
          .replace(/https?:\/\/[^\s]+/g, '')
          .trim();

        if (!cleanedText) return;

        const res = await fetch('/api/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: cleanedText }),
        });

        if (!res.ok) return;

        const audioBlob = await res.blob();
        const audioUrl = URL.createObjectURL(audioBlob);
        currentAudio = new Audio(audioUrl);
        await currentAudio.play();
        await new Promise(resolve => {
          currentAudio.onended = resolve;
          currentAudio.onerror = resolve;
        });
      } catch (e) {
        console.error('Speak error:', e);
      }
    }

    function cleanForDisplay(text) {
      return text
        .replace(/<match>[\s\S]*?<\/match>/g, '')
        .replace(/\*\*/g, '')
        .replace(/\*/g, '')
        .trim();
    }

    function extractMatch(text) {
      const m = text.match(/<match>([\s\S]*?)<\/match>/);
      if (m) { try { return JSON.parse(m[1]); } catch { return null; } }
      return null;
    }

    function showResult(data) {
      matched = true;
      micBtn.classList.add('disabled');
      micHint.textContent = 'Issue identified';
      setStatus('', 'Complete');

      const fields = document.getElementById('resultFields');
      fields.innerHTML = [
        { label: 'Category', val: data.category },
        { label: 'Subcategory', val: data.subcategory },
        { label: 'Issue', val: data.issue },
      ].map(f => `
        <div class="result-field">
          <div class="field-label">${f.label}</div>
          <div class="field-value">${escHtml(f.val)}</div>
        </div>
      `).join('');

      if (data.summary) {
        document.getElementById('resultSummary').innerHTML = `
          <div class="result-summary">
            <div class="summary-label">Issue Description</div>
            ${escHtml(data.summary)}
          </div>`;
      }

      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resetBtn').style.display = 'block';
    }

    function resetCall() {
      conversationHistory = [];
      matched = false;
      hasGreeted = false;
      isBusy = false;
      isListening = false;
      detectedLanguage = 'en';
      currentAudio = null;

      micBtn.className = 'mic-btn';
      micRing.classList.remove('active');
      setStatus('', 'Ready');
      micHint.textContent = 'Tap to start speaking';

      transcript.innerHTML = '<div class="transcript-empty" id="transcriptEmpty">Your conversation will appear here</div>';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('resultFields').innerHTML = '';
      document.getElementById('resultSummary').innerHTML = '';
      document.getElementById('resetBtn').style.display = 'none';
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>

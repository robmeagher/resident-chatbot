<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Demo – Maymont Homes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; align-items: center; }

    .header { text-align: center; }
    .header img { height: 52px; width: auto; margin: 0 auto 14px; display: block; }
    .header h1 { font-size: 20px; font-weight: 500; color: #111827; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #9ca3af; }

    /* Phone card */
    .phone-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* Start screen */
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 8px 0;
    }
    .start-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .start-title { font-size: 16px; font-weight: 500; color: #111827; text-align: center; }
    .start-sub { font-size: 13px; color: #6b7280; text-align: center; line-height: 1.5; }
    .start-btn {
      background: #111827; color: #fff; border: none; border-radius: 50px;
      padding: 12px 32px; font-size: 15px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.2s;
    }
    .start-btn:hover { background: #1f2937; }

    /* Call screen */
    .call-screen { display: none; flex-direction: column; align-items: center; gap: 20px; width: 100%; }

    /* Status */
    .status-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .status-indicator {
      display: flex; align-items: center; gap: 8px;
      background: #f9fafb; border-radius: 50px;
      padding: 6px 14px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #d1d5db; flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.listening { background: #22c55e; animation: pulse-dot 1s infinite; }
    .status-dot.thinking { background: #f59e0b; }
    .status-dot.speaking { background: #3b82f6; animation: pulse-dot 1s infinite; }
    .status-dot.idle { background: #d1d5db; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }
    .status-text { font-size: 13px; color: #374151; font-weight: 500; }

    /* Audio visualizer */
    .visualizer {
      display: flex; align-items: center; justify-content: center;
      gap: 3px; height: 32px; opacity: 0;
      transition: opacity 0.3s;
    }
    .visualizer.active { opacity: 1; }
    .bar {
      width: 3px; border-radius: 2px; background: #22c55e;
      animation: none; height: 4px;
      transition: height 0.1s;
    }

    /* End call button */
    .end-btn {
      width: 56px; height: 56px; border-radius: 50%;
      background: #ef4444; color: white; border: none;
      font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; box-shadow: 0 2px 8px rgba(239,68,68,0.3);
    }
    .end-btn:hover { background: #dc2626; }

    /* Transcript */
    .transcript-wrap { width: 100%; }
    .transcript-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .transcript {
      background: #f9fafb;
      border: 1px solid #f3f4f6;
      border-radius: 12px;
      padding: 12px 14px;
      min-height: 80px;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .transcript-empty { font-size: 13px; color: #d1d5db; text-align: center; margin: auto; }
    .t-line { font-size: 13px; line-height: 1.5; }
    .t-line .speaker { font-size: 10px; color: #9ca3af; display: block; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
    .t-line.resident .text { color: #111827; }
    .t-line.bot .text { color: #2563eb; }

    /* Result card */
    .result-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
    }
    .result-bar { height: 3px; background: #22c55e; }
    .result-inner { padding: 14px 16px; }
    .result-label-text { font-size: 10px; letter-spacing: 0.12em; color: #9ca3af; text-transform: uppercase; margin-bottom: 10px; }
    .result-fields { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
    .result-field { background: #f9fafb; border-radius: 8px; padding: 7px 11px; }
    .field-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .field-value { font-size: 13px; font-weight: 500; color: #111827; }
    .result-summary-wrap { border-top: 1px solid #f3f4f6; padding-top: 10px; margin-top: 10px; }
    .summary-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .summary-text { font-size: 12px; color: #6b7280; line-height: 1.6; }
    .result-success { background: #f0fdf4; border-radius: 8px; padding: 9px 12px; font-size: 13px; color: #15803d; font-weight: 500; margin-top: 10px; }

    .new-call-btn {
      background: none; border: none; color: #9ca3af; font-size: 12px;
      cursor: pointer; font-family: inherit; text-decoration: underline;
    }
    .new-call-btn:hover { color: #6b7280; }

    /* Timeout warning */
    .timeout-bar {
      width: 100%; height: 3px; background: #f3f4f6; border-radius: 2px; overflow: hidden;
      display: none;
    }
    .timeout-fill {
      height: 100%; background: #f59e0b; border-radius: 2px;
      transition: width linear;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <img src="https://maymonthomes.com/wp-content/uploads/2023/06/logo_2x.png" alt="Maymont Homes" />
      <h1>Maintenance Voice Line</h1>
      <p>AI-powered maintenance issue reporting</p>
    </div>

    <div class="phone-card" id="phoneCard">

      <!-- Start Screen -->
      <div class="start-screen" id="startScreen">
        <div class="start-icon">📞</div>
        <div class="start-title">Ready to connect</div>
        <div class="start-sub">Tap to start a demo call. Describe your maintenance issue naturally — the assistant will guide you.</div>
        <button class="start-btn" onclick="startCall()">
          <span>📞</span> Start Demo Call
        </button>
      </div>

      <!-- Call Screen -->
      <div class="call-screen" id="callScreen">

        <div class="status-wrap">
          <div class="status-indicator">
            <div class="status-dot idle" id="statusDot"></div>
            <div class="status-text" id="statusText">Connecting...</div>
          </div>
        </div>

        <div class="visualizer" id="visualizer">
          <div class="bar" id="b1"></div>
          <div class="bar" id="b2"></div>
          <div class="bar" id="b3"></div>
          <div class="bar" id="b4"></div>
          <div class="bar" id="b5"></div>
          <div class="bar" id="b6"></div>
          <div class="bar" id="b7"></div>
        </div>

        <div class="timeout-bar" id="timeoutBar">
          <div class="timeout-fill" id="timeoutFill" style="width:100%"></div>
        </div>

        <button class="end-btn" onclick="endCall()" title="End call">📵</button>

        <div class="transcript-wrap">
          <div class="transcript-label">Conversation</div>
          <div class="transcript" id="transcript">
            <div class="transcript-empty" id="transcriptEmpty">Listening for your voice...</div>
          </div>
        </div>

      </div>

    </div>

    <!-- Result Card -->
    <div class="result-card" id="resultCard" style="display:none">
      <div class="result-bar"></div>
      <div class="result-inner">
        <p class="result-label-text">Issue Identified</p>
        <div class="result-fields" id="resultFields"></div>
        <div id="resultSummary"></div>
        <div class="result-success">✓ Ready to submit in Quickbase</div>
      </div>
    </div>

    <button class="new-call-btn" id="newCallBtn" style="display:none" onclick="resetAll()">Start new call</button>

  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let stream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let audioContext = null;
    let analyser = null;
    let silenceTimer = null;
    let inactivityTimer = null;
    let stillThereTimer = null;
    let visualizerInterval = null;
    let conversationHistory = [];
    let detectedLanguage = 'en';
    let matched = false;
    let isBusy = false;
    let isListening = false;
    let callActive = false;
    let currentAudio = null;
    let askedStillThere = false;

    // ─── Timing constants (industry standard) ────────────────────────────────
    const SILENCE_THRESHOLD = 0.015;       // audio level below this = silence
    const SILENCE_DURATION = 2500;          // ms of silence before auto-submit (Twilio standard: ~3s)
    const INACTIVITY_TIMEOUT = 7000;        // ms after bot speaks before "still there?" (MS Copilot standard: 7s)
    const DISCONNECT_TIMEOUT = 10000;       // ms after "still there?" before ending call

    // ─── UI helpers ──────────────────────────────────────────────────────────
    function setStatus(state, text) {
      const dot = document.getElementById('statusDot');
      dot.className = 'status-dot ' + state;
      document.getElementById('statusText').textContent = text;
    }

    function addLine(role, text) {
      const t = document.getElementById('transcript');
      const empty = document.getElementById('transcriptEmpty');
      if (empty) empty.remove();
      const line = document.createElement('div');
      line.className = `t-line ${role}`;
      line.innerHTML = `<span class="speaker">${role === 'resident' ? 'You' : 'Maymont'}</span><span class="text">${escHtml(text)}</span>`;
      t.appendChild(line);
      t.scrollTop = t.scrollHeight;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showTimeoutBar(durationMs) {
      const bar = document.getElementById('timeoutBar');
      const fill = document.getElementById('timeoutFill');
      bar.style.display = 'block';
      fill.style.transition = 'none';
      fill.style.width = '100%';
      setTimeout(() => {
        fill.style.transition = `width ${durationMs}ms linear`;
        fill.style.width = '0%';
      }, 50);
    }

    function hideTimeoutBar() {
      const bar = document.getElementById('timeoutBar');
      bar.style.display = 'none';
      document.getElementById('timeoutFill').style.width = '100%';
    }

    // ─── Visualizer ──────────────────────────────────────────────────────────
    function startVisualizer() {
      const bars = ['b1','b2','b3','b4','b5','b6','b7'].map(id => document.getElementById(id));
      document.getElementById('visualizer').classList.add('active');
      visualizerInterval = setInterval(() => {
        if (analyser) {
          const data = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(data);
          bars.forEach((bar, i) => {
            const val = data[Math.floor(i * data.length / bars.length)];
            bar.style.height = Math.max(4, val / 4) + 'px';
            bar.style.background = '#22c55e';
          });
        } else {
          bars.forEach(bar => {
            bar.style.height = (4 + Math.random() * 8) + 'px';
          });
        }
      }, 80);
    }

    function stopVisualizer() {
      clearInterval(visualizerInterval);
      document.getElementById('visualizer').classList.remove('active');
      ['b1','b2','b3','b4','b5','b6','b7'].forEach(id => {
        document.getElementById(id).style.height = '4px';
      });
    }

    // ─── Inactivity timers ───────────────────────────────────────────────────
    function clearAllTimers() {
      clearTimeout(inactivityTimer);
      clearTimeout(stillThereTimer);
      clearTimeout(silenceTimer);
      hideTimeoutBar();
    }

    function startInactivityTimer() {
      if (!callActive || matched) return;
      clearAllTimers();
      askedStillThere = false;

      inactivityTimer = setTimeout(async () => {
        if (!callActive || matched || isListening || isBusy) return;
        const phrase = detectedLanguage === 'es'
          ? '¿Sigues ahí?'
          : 'Are you still there?';
        addLine('bot', phrase);
        showTimeoutBar(DISCONNECT_TIMEOUT);
        setStatus('speaking', 'Speaking...');
        await speak(phrase);
        askedStillThere = true;
        setStatus('listening', 'Listening...');

        stillThereTimer = setTimeout(() => {
          if (!callActive || matched || isListening || isBusy) return;
          const goodbye = detectedLanguage === 'es'
            ? 'Parece que nos desconectamos. ¡Que tengas un buen día!'
            : 'Looks like we got disconnected. Feel free to call back anytime. Take care!';
          addLine('bot', goodbye);
          speak(goodbye).then(() => endCall());
        }, DISCONNECT_TIMEOUT);

      }, INACTIVITY_TIMEOUT);
    }

    // ─── Start call ──────────────────────────────────────────────────────────
    async function startCall() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('callScreen').style.display = 'flex';
      callActive = true;
      isBusy = true;
      setStatus('thinking', 'Connecting...');

      try {
        // Get mic access early
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // Greet
        const greeting = await getChatResponse([{ role: 'user', content: 'Hello, I need to report a maintenance issue.' }]);
        if (greeting) {
          conversationHistory.push({ role: 'user', content: 'Hello, I need to report a maintenance issue.' });
          conversationHistory.push({ role: 'assistant', content: greeting });
          const clean = cleanText(greeting);
          addLine('bot', clean);
          setStatus('speaking', 'Speaking...');
          await speak(greeting);
        }
      } catch (e) {
        console.error('Start error:', e);
        if (!stream) {
          alert('Microphone access is required. Please allow microphone access and try again.');
          resetAll();
          return;
        }
      }

      isBusy = false;
      if (callActive && !matched) {
        startListening();
      }
    }

    // ─── Listening ───────────────────────────────────────────────────────────
    async function startListening() {
      if (!callActive || matched || isBusy) return;

      clearAllTimers();
      askedStillThere = false;

      try {
        if (!stream || stream.getTracks().every(t => t.readyState === 'ended')) {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        }

        audioChunks = [];
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source.connect(analyser);

        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = processAudio;
        mediaRecorder.start(100);

        isListening = true;
        setStatus('listening', 'Listening...');
        startVisualizer();
        monitorSilence();

      } catch (e) {
        console.error('Listen error:', e);
        setStatus('idle', 'Ready');
      }
    }

    function monitorSilence() {
      if (!isListening || !analyser) return;

      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteTimeDomainData(data);

      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        sum += Math.abs(data[i] - 128);
      }
      const avg = sum / data.length / 128;

      if (avg < SILENCE_THRESHOLD) {
        if (!silenceTimer) {
          silenceTimer = setTimeout(() => {
            if (isListening && audioChunks.length > 0) {
              stopListening();
            }
          }, SILENCE_DURATION);
        }
      } else {
        clearTimeout(silenceTimer);
        silenceTimer = null;
      }

      if (isListening) {
        requestAnimationFrame(monitorSilence);
      }
    }

    function stopListening() {
      if (!isListening) return;
      isListening = false;
      clearTimeout(silenceTimer);
      silenceTimer = null;
      stopVisualizer();

      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
      }
      if (audioContext) {
        audioContext.close();
        audioContext = null;
        analyser = null;
      }

      isBusy = true;
      setStatus('thinking', 'Processing...');
    }

    // ─── Process audio ────────────────────────────────────────────────────────
    async function processAudio() {
      if (!callActive) return;

      try {
        // Transcribe
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const transcribeRes = await fetch('/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'audio/webm' },
          body: blob,
        });
        const transcribeData = await transcribeRes.json();
        const userText = transcribeData.transcript?.trim();
        detectedLanguage = transcribeData.detectedLanguage || detectedLanguage;

        if (!userText) {
          isBusy = false;
          if (callActive && !matched) startListening();
          return;
        }

        addLine('resident', userText);
        conversationHistory.push({ role: 'user', content: userText });

        // Get response
        setStatus('thinking', 'Thinking...');
        const botRaw = await getChatResponse(conversationHistory);
        if (!botRaw) throw new Error('No response');

        const clean = cleanText(botRaw);
        const matchData = extractMatch(botRaw);
        conversationHistory.push({ role: 'assistant', content: botRaw });
        addLine('bot', clean);

        if (matchData) showResult(matchData);

        // Speak
        setStatus('speaking', 'Speaking...');
        await speak(botRaw);

        isBusy = false;

        if (!matched && callActive) {
          setStatus('listening', 'Listening...');
          startListening();
          startInactivityTimer();
        }

      } catch (e) {
        console.error('Process error:', e);
        isBusy = false;
        if (callActive && !matched) {
          setStatus('listening', 'Listening...');
          startListening();
        }
      }
    }

    // ─── API calls ────────────────────────────────────────────────────────────
    async function getChatResponse(messages) {
      const res = await fetch('/api/voicechat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, detectedLanguage }),
      });
      const data = await res.json();
      return data.content?.[0]?.text || null;
    }

    async function speak(text) {
      try {
        const stripped = text
          .replace(/<match>[\s\S]*?<\/match>/g, '')
          .replace(/https?:\/\/[^\s]+/g, '')
          .replace(/\*\*/g, '').replace(/\*/g, '')
          .trim();
        if (!stripped) return;

        const res = await fetch('/api/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: stripped }),
        });
        if (!res.ok) return;

        const audioBlob = await res.blob();
        const url = URL.createObjectURL(audioBlob);
        currentAudio = new Audio(url);
        await currentAudio.play();
        await new Promise(resolve => {
          currentAudio.onended = resolve;
          currentAudio.onerror = resolve;
        });
        URL.revokeObjectURL(url);
      } catch (e) {
        console.error('Speak error:', e);
      }
    }

    // ─── Result / end call ────────────────────────────────────────────────────
    function showResult(data) {
      matched = true;
      clearAllTimers();
      setStatus('idle', 'Issue identified');

      const fields = document.getElementById('resultFields');
      fields.innerHTML = [
        { label: 'Category', val: data.category },
        { label: 'Subcategory', val: data.subcategory },
        { label: 'Issue', val: data.issue },
      ].map(f => `
        <div class="result-field">
          <div class="field-label">${f.label}</div>
          <div class="field-value">${escHtml(f.val)}</div>
        </div>
      `).join('');

      if (data.summary) {
        document.getElementById('resultSummary').innerHTML = `
          <div class="result-summary-wrap">
            <div class="summary-label">Issue Description</div>
            <div class="summary-text">${escHtml(data.summary)}</div>
          </div>`;
      }

      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('newCallBtn').style.display = 'block';
    }

    function endCall() {
      callActive = false;
      matched = true;
      clearAllTimers();

      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }

      stopVisualizer();
      setStatus('idle', 'Call ended');
      document.getElementById('newCallBtn').style.display = 'block';
    }

    function resetAll() {
      endCall();
      callActive = false;
      matched = false;
      isBusy = false;
      isListening = false;
      conversationHistory = [];
      detectedLanguage = 'en';
      askedStillThere = false;

      document.getElementById('callScreen').style.display = 'none';
      document.getElementById('startScreen').style.display = 'flex';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('resultFields').innerHTML = '';
      document.getElementById('resultSummary').innerHTML = '';
      document.getElementById('newCallBtn').style.display = 'none';
      document.getElementById('transcript').innerHTML =
        '<div class="transcript-empty" id="transcriptEmpty">Listening for your voice...</div>';
      setStatus('idle', 'Connecting...');
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function cleanText(text) {
      return text.replace(/<match>[\s\S]*?<\/match>/g, '').replace(/\*\*/g,'').replace(/\*/g,'').trim();
    }

    function extractMatch(text) {
      const m = text.match(/<match>([\s\S]*?)<\/match>/);
      if (m) { try { return JSON.parse(m[1]); } catch { return null; } }
      return null;
    }
  </script>
</body>
</html>

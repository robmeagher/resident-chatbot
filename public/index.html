<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resident Maintenance Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #1a1a2e;
    }

    .container { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 14px; }

    .header { text-align: center; margin-bottom: 4px; }
    .header img { height: 56px; width: auto; margin: 0 auto 16px; display: block; }
    .header h1 { font-size: 22px; font-weight: 500; color: #111827; margin-bottom: 6px; }

    /* Result card */
    .result-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .result-bar { height: 3px; background: #22c55e; }
    .result-inner { padding: 16px 20px; }
    .result-label { font-size: 11px; letter-spacing: 0.12em; color: #9ca3af; text-transform: uppercase; margin-bottom: 12px; }
    .result-fields { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .result-field { background: #f9fafb; border-radius: 8px; padding: 8px 12px; }
    .result-field .field-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
    .result-field .field-value { font-size: 14px; font-weight: 500; color: #111827; }
    .result-actions { display: flex; gap: 8px; }
    .result-success { flex: 1; background: #f0fdf4; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #15803d; font-weight: 500; }
    .btn-reset { background: transparent; border: 1px solid #e5e7eb; border-radius: 8px; color: #6b7280; padding: 10px 14px; font-size: 13px; cursor: pointer; font-family: inherit; }
    .btn-reset:hover { background: #f9fafb; }

    /* Main card */
    .main-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Messages - hidden until first send */
    .messages {
      display: none;
      overflow-y: auto;
      padding: 16px;
      flex-direction: column;
      gap: 12px;
      max-height: 400px;
      border-bottom: 1px solid #f3f4f6;
    }
    .messages.active { display: flex; }

    .msg-row { display: flex; align-items: flex-end; gap: 8px; }
    .msg-row.user { justify-content: flex-end; }
    .avatar { width: 26px; height: 26px; border-radius: 50%; background: #eff6ff; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .bubble { max-width: 80%; padding: 9px 13px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
    .bubble.assistant { background: #f3f4f6; border-radius: 14px 14px 14px 4px; color: #111827; }
    .bubble.user { background: #2563eb; border-radius: 14px 14px 4px 14px; color: #fff; }

    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #9ca3af; animation: pulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

    /* Welcome block - shown before first message */
    .welcome {
      padding: 28px 24px 20px;
      text-align: center;
    }
    .welcome h2 { font-size: 17px; font-weight: 500; color: #111827; margin-bottom: 8px; }
    .welcome p { font-size: 14px; color: #6b7280; line-height: 1.6; }

    /* Input row - always visible at bottom of card */
    .input-row {
      padding: 12px;
      display: flex;
      gap: 8px;
      background: #fff;
    }
    .input-row input {
      flex: 1; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 10px 14px; font-size: 14px; font-family: inherit;
      outline: none; color: #111827; background: #f9fafb;
    }
    .input-row input:focus { border-color: #2563eb; background: #fff; }
    .btn-send {
      background: #2563eb; color: #fff; border: none; border-radius: 8px;
      padding: 10px 18px; font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-send:hover { background: #1d4ed8; }
    .btn-send:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <img src="https://maymonthomes.com/wp-content/uploads/2023/06/logo_2x.png" alt="Maymont Homes" />
      <h1>Resident Maintenance Portal</h1>
    </div>

    <div class="result-card" id="resultCard" style="display:none">
      <div class="result-bar"></div>
      <div class="result-inner">
        <p class="result-label">Issue identified</p>
        <div class="result-fields" id="resultFields"></div>
        <div class="result-actions">
          <div class="result-success">✓ Ready to submit in Quickbase</div>
          <button class="btn-reset" onclick="reset()">New report</button>
        </div>
      </div>
    </div>

    <div class="main-card">
      <div class="messages" id="messages"></div>

      <div class="welcome" id="welcome">
        <h2>What's going on at home?</h2>
        <p>Describe your issue and we'll help you select the right category for your maintenance request.</p>
      </div>

      <div class="input-row" id="inputRow">
        <input
          type="text"
          id="userInput"
          placeholder="Describe your issue..."
          onkeydown="if(event.key==='Enter')sendMessage()"
          autofocus
        />
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>

  </div>

  <script>
    let history = [];
    let matched = false;

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text || matched) return;
      input.value = '';

      // Hide welcome block, show messages on first send
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
      document.getElementById('messages').classList.add('active');

      history.push({ role: 'user', content: text });
      addBubble('user', text);
      await getReply();
    }

    async function getReply() {
      const sendBtn = document.getElementById('sendBtn');
      const input = document.getElementById('userInput');
      sendBtn.disabled = true;
      input.disabled = true;
      const typing = addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        const raw = data.content?.[0]?.text || data.error || 'Sorry, something went wrong. Please try again.';
        typing.remove();
        const matchData = extractMatch(raw);
        const clean = raw.replace(/<match>[\s\S]*?<\/match>/g, '').trim();
        addBubble('assistant', clean);
        history.push({ role: 'assistant', content: raw });
        if (matchData) showResult(matchData);
      } catch {
        typing.remove();
        addBubble('assistant', 'Sorry, something went wrong. Please try again.');
      }

      sendBtn.disabled = false;
      input.disabled = false;
      if (!matched) input.focus();
    }

    function addBubble(role, text) {
      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = `msg-row ${role}`;
      if (role === 'assistant') {
        row.innerHTML = `<div class="avatar">🏠</div><div class="bubble assistant">${escHtml(text)}</div>`;
      } else {
        row.innerHTML = `<div class="bubble user">${escHtml(text)}</div>`;
      }
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
      return row;
    }

    function addTyping() {
      const msgs = document.getElementById('messages');
      const row = document.createElement('div');
      row.className = 'msg-row';
      row.innerHTML = `<div class="avatar">🏠</div><div class="bubble assistant"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
      msgs.appendChild(row);
      msgs.scrollTop = msgs.scrollHeight;
      return row;
    }

    function extractMatch(text) {
      const m = text.match(/<match>([\s\S]*?)<\/match>/);
      if (m) { try { return JSON.parse(m[1]); } catch { return null; } }
      return null;
    }

    function showResult(data) {
      matched = true;
      document.getElementById('inputRow').style.display = 'none';
      const card = document.getElementById('resultCard');
      const fields = document.getElementById('resultFields');
      fields.innerHTML = [
        { label: 'Category', val: data.category },
        { label: 'Subcategory', val: data.subcategory },
        { label: 'Issue', val: data.issue },
      ].map(f => `
        <div class="result-field">
          <div class="field-label">${f.label}</div>
          <div class="field-value">${escHtml(f.val)}</div>
        </div>
      `).join('');
      card.style.display = 'block';
    }

    function reset() {
      matched = false;
      history = [];
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('resultFields').innerHTML = '';
      document.getElementById('messages').innerHTML = '';
      document.getElementById('messages').classList.remove('active');
      document.getElementById('inputRow').style.display = 'flex';

      const mainCard = document.querySelector('.main-card');
      const welcome = document.createElement('div');
      welcome.className = 'welcome';
      welcome.id = 'welcome';
      welcome.innerHTML = '<h2>What\'s going on at home?</h2><p>We\'ll help you select the right category for your maintenance request.</p>';
      mainCard.insertBefore(welcome, document.getElementById('inputRow'));

      document.getElementById('userInput').value = '';
      document.getElementById('userInput').focus();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
